## Production backend
backend:
  name: github
  repo: GSA/councils.gov
  base_url: https://pages.cloud.gov
  auth_endpoint: external/auth/github
  preview_context: pages/build
  branch: main
  use_graphql: true

##
## Local development with Decap proxy backend
## Run `npx netlify-cms-proxy-server` to start working locally
## In another terminal, start the app with `npm start`
## See https://www.netlifycms.org/docs/beta-features/#working-with-a-local-git-repository
##
# backend:
#   name: git-gateway
# local_backend: true

media_folder: /public/assets/img
public_folder: /assets/img
publish_mode: editorial_workflow
logo_url: https://pages.cloud.gov/images/logos/pages-logo-blue.svg
site_url: https://www.councils.gov

editor:
  preview: false

collections:
  - name: resources
    label: Resources
    files:
      - label: Resources
        name: resources
        file: src/data/resources.json
        format: json
        fields:
          - label: Resources
            name: resources
            widget: list
            summary: "{{fields.councilAcronym}} - {{fields.title}}"
            fields:
              - { label: ID, name: id, widget: hidden, required: false }
              - { label: Title, name: title, widget: string }
              - {
                  label: Description,
                  name: description,
                  widget: text,
                  required: false,
                }
              - label: Type
                name: type
                widget: relation
                collection: resources
                file: types
                search_fields: ["options.*.value"]
                display_fields: ["options.*.value"]
                value_field: "options.*.value"
                multiple: true
              - label: Focus Area
                name: focusArea
                widget: relation
                collection: resources
                file: focus_areas
                search_fields: ["options.*.value"]
                display_fields: ["options.*.value"]
                value_field: "options.*.value"
                multiple: true
                required: false
              - label: Council Acronym
                name: councilAcronym
                widget: relation
                collection: resources
                file: councils
                search_fields: ["options.*.value"]
                display_fields: ["options.*.value"]
                value_field: "options.*.value"
                multiple: true
              - {
                  label: Date,
                  name: date,
                  widget: datetime,
                  required: false,
                  format: "YYYY-MM-DD",
                  date_format: "YYYY-MM-DD",
                  time_format: false,
                  hint: "Select a date or leave blank",
                }
              - label: Link
                name: link
                widget: file
                choose_url: true
                media_folder: /public/docs
                public_folder: /docs
                hint: "Upload a PDF or provide an external URL."
      - label: Councils
        name: councils
        file: src/data/councils.json
        format: json
        fields:
          - label: Options
            name: options
            widget: list
            summary: "{{fields.value}}"
            fields:
              - { label: Value, name: value, widget: string }
      - label: Focus Areas
        name: focus_areas
        file: src/data/focus-areas.json
        format: json
        fields:
          - label: Options
            name: options
            widget: list
            summary: "{{fields.value}}"
            fields:
              - { label: Value, name: value, widget: string }
      - label: Types
        name: types
        file: src/data/types.json
        format: json
        fields:
          - label: Options
            name: options
            widget: list
            summary: "{{fields.value}}"
            fields:
              - { label: Value, name: value, widget: string }
